name: Lint

on:
  push:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TML_VERSION: v2026.05.3.0
  MOD_DIR: ${{ github.workspace }}/tModLoader/ModSources/OmoriMod
  TML_DIR: ${{ github.workspace }}/tModLoader

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          path: tModLoader/ModSources/OmoriMod

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache tModLoader archive
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/tModLoader-${{ env.TML_VERSION }}.zip
          key: tmloader-${{ env.TML_VERSION }}-${{ runner.os }}-${{ hashFiles('tModLoader/ModSources/OmoriMod/.github/scripts/setup-tmodloader.sh') }}

      - name: Set up tModLoader
        working-directory: ${{ github.workspace }}
        shell: bash
        run: bash "${MOD_DIR}/.github/scripts/setup-tmodloader.sh"

      - name: Verify checkout integrity
        working-directory: ${{ env.MOD_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          actual_sha="$(git rev-parse HEAD)"
          if [[ "${actual_sha}" != "${GITHUB_SHA}" ]]; then
            echo "Expected checkout ${GITHUB_SHA}, but found ${actual_sha} after restoring the tModLoader cache." >&2
            exit 1
          fi

          if [[ -n "$(git status --porcelain=v1)" ]]; then
            echo "The mod checkout was modified while restoring the tModLoader cache:" >&2
            git status --short >&2
            exit 1
          fi

      - name: Restore
        working-directory: ${{ env.MOD_DIR }}
        run: dotnet restore OmoriMod.csproj

      - name: Format check
        working-directory: ${{ env.MOD_DIR }}
        run: |
          dotnet format OmoriMod.csproj \
            --include . \
            --no-restore \
            --verify-no-changes \
            --severity info \
            --verbosity minimal
